name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    env:
      GRADLE_VERSION: 8.10.2
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Use pre-installed JDK 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> "$GITHUB_ENV"
          echo "$JAVA_HOME_17_X64/bin" >> "$GITHUB_PATH"
          "$JAVA_HOME_17_X64/bin/java" -version

      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        run: |
          curl -fSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"
          /opt/gradle-${GRADLE_VERSION}/bin/gradle --version

      - name: Verify Android SDK (pre-installed)
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms" || true
          ls "$ANDROID_HOME/build-tools" || true

      - name: Cache Gradle user home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install Android SDK components (platform 35, build-tools 35.0.0)
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace --info

      - name: Build unsigned release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace --info

      - name: Dump build reports on failure
        if: failure()
        run: |
          echo "::group::lint-results"
          find app/build/reports -type f 2>/dev/null | head -50 || true
          for f in $(find app/build/reports -name '*.txt' -o -name '*.html' 2>/dev/null | head -10); do
            echo "===== $f ====="
            cat "$f" 2>/dev/null | head -200 || true
          done
          echo "::endgroup::"

      - name: Upload build outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-output
          path: |
            app/build/reports/
            app/build/outputs/logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: warn
          retention-days: 30
